# -*- coding: utf-8 -*-
[pytest]
# 测试文件模式
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# 标记定义
markers =
    regression: 回归测试 - 防止历史 Bug 复发
    critical: 关键测试 - 失败时阻止部署
    unit: 单元测试
    integration: 集成测试
    performance: 性能测试
    property_test: 属性测试
    pipeline: Pipeline 相关测试
    timeout: 超时标记

# 警告过滤
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# 测试路径
# testpaths = tests

# 覆盖率配置
addopts = 
    -v
    --tb=short
    --strict-markers
    --cov=backend/app
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml

# 异步测试配置
asyncio_mode = auto

# 超时配置
timeout = 60
